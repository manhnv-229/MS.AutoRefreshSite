<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoRefresh - Random Interval</title>
    <!-- Sử dụng system fonts để tránh remote code - không cần CDN ngoài -->
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"
            fill="currentColor"
          />
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">AutoRefresh</h1>
        <span class="header-subtitle">Random Interval Timer</span>
      </div>
      <div class="header-badge" id="globalStatus">IDLE</div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Tab Selector -->
      <section class="section">
        <label class="section-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <rect
              x="2"
              y="4"
              width="20"
              height="16"
              rx="2"
              stroke="currentColor"
              stroke-width="2"
            />
            <path d="M8 4V2M16 4V2" stroke="currentColor" stroke-width="2" />
          </svg>
          Chọn tab để refresh
        </label>
        <div class="tab-selector-wrapper">
          <select id="tabSelect" class="tab-select">
            <option value="">-- Đang tải danh sách tab... --</option>
          </select>
          <button id="refreshTabsBtn" class="icon-btn" title="Tải lại danh sách tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path
                d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>

        <!-- Tab Preview Card -->
        <div class="tab-preview" id="tabPreview">
          <div class="tab-preview-icon" id="tabFavicon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="tab-preview-info">
            <div class="tab-preview-title" id="tabPreviewTitle">Chưa chọn tab</div>
            <div class="tab-preview-url" id="tabPreviewUrl">Hãy chọn tab bên trên</div>
          </div>
        </div>
      </section>

      <!-- Interval Settings -->
      <section class="section">
        <label class="section-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Khoảng thời gian (giây)
        </label>

        <div class="interval-grid">
          <div class="interval-input-group">
            <label class="input-label">Tối thiểu (x)</label>
            <div class="input-wrapper">
              <input
                type="number"
                id="minSeconds"
                class="interval-input"
                value="10"
                min="1"
                max="3600"
                placeholder="10"
              />
              <span class="input-unit">s</span>
            </div>
          </div>

          <div class="interval-divider">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>

          <div class="interval-input-group">
            <label class="input-label">Tối đa (y)</label>
            <div class="input-wrapper">
              <input
                type="number"
                id="maxSeconds"
                class="interval-input"
                value="30"
                min="1"
                max="3600"
                placeholder="30"
              />
              <span class="input-unit">s</span>
            </div>
          </div>
        </div>

        <!-- Quick Presets -->
        <div class="presets">
          <span class="presets-label">Nhanh:</span>
          <button class="preset-btn" data-min="5" data-max="10">5-10s</button>
          <button class="preset-btn" data-min="15" data-max="30">15-30s</button>
          <button class="preset-btn" data-min="30" data-max="60">30-60s</button>
          <button class="preset-btn" data-min="60" data-max="120">1-2m</button>
          <button class="preset-btn" data-min="300" data-max="600">5-10m</button>
        </div>
      </section>

      <!-- Status Panel -->
      <div class="status-panel" id="statusPanel" style="display: none">
        <div class="status-header">
          <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span>Đang chạy</span>
          </div>
          <span class="refresh-count">
            Đã refresh: <strong id="refreshCount">0</strong> lần
          </span>
        </div>
        <div class="countdown-wrapper">
          <div class="countdown-label">Refresh tiếp theo sau</div>
          <div class="countdown-display" id="countdownDisplay">
            <span class="countdown-num" id="countdownNum">--</span>
            <span class="countdown-unit">giây</span>
          </div>
          <div class="countdown-bar-wrapper">
            <div class="countdown-bar" id="countdownBar"></div>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button id="startBtn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
          </svg>
          Bắt đầu AutoRefresh
        </button>
        <button id="stopBtn" class="btn btn-danger" style="display: none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
          </svg>
          Dừng
        </button>
      </div>

      <!-- Error Message -->
      <div class="error-msg" id="errorMsg" style="display: none"></div>

      <!-- Active Sessions -->
      <section class="section" id="activeSessionsSection" style="display: none">
        <label class="section-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2"/>
          </svg>
          Tab đang refresh khác
        </label>
        <div id="activeSessionsList" class="sessions-list"></div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>AutoRefresh v1.0 • Random Interval Chrome Extension</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
